<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>1軒の家 × Data Space — Before / After</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060610;color:#c8cce8;font-family:'Helvetica Neue','Hiragino Kaku Gothic ProN',sans-serif;padding:16px 20px}
.wrap{max-width:1200px;margin:0 auto}
h1{font-size:1.2rem;color:#eef;font-weight:800;text-align:center}
.sub{font-size:.72rem;color:#555580;text-align:center;margin-bottom:10px}

/* Steps */
.steps{display:flex;gap:0;margin:8px 0;justify-content:center}
.stp{flex:0 0 auto;text-align:center;padding:4px 12px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-size:.72rem;color:#555580}
.stp:hover{color:#aaa}
.stp.on{color:#00c8ff;border-color:#00c8ff;font-weight:700}
.stp.done{color:#51cf66;border-color:#51cf66}
.stp .sn{font-size:.6rem;display:block}

/* Nav */
.nav-bar{display:flex;align-items:center;gap:10px;justify-content:center;margin:8px 0}
.nav-bar button{background:#10102a;border:1px solid #1e1e40;color:#c8cce8;padding:6px 18px;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600}
.nav-bar button:hover{border-color:#00c8ff;color:#00c8ff}
.nav-bar button.primary{background:#00c8ff;color:#060610;border-color:#00c8ff}
.nav-bar .label{font-size:.8rem;color:#eef;font-weight:700;flex:1;text-align:center}

/* 2-col */
.row{display:flex;gap:14px;margin:8px 0;align-items:stretch}
.col-house{flex:1;min-width:0}
.col-chart{flex:1;min-width:0;display:flex;flex-direction:column;gap:10px}

/* House */
.house{background:#08081a;border:2px solid #1e1e40;border-radius:12px;padding:12px;transition:border-color .4s}
.roof{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#0c0c1a;border-radius:8px 8px 0 0;margin:-12px -12px 8px;border-bottom:1px solid #1e1e40}
.devs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.dev{text-align:center;padding:6px 4px;border-radius:8px;border:1.5px solid #1e1e40;background:#0a0a14;transition:all .4s}
.dev .ic{font-size:1.3rem}
.dev .nm{font-size:.68rem;font-weight:700;margin:2px 0}
.dev .vl{font-size:.9rem;font-weight:800;font-family:'SF Mono',monospace;transition:color .4s}
.dev .sb{font-size:.58rem;color:#555580}
.dev .badge{display:inline-block;font-size:.52rem;font-weight:700;padding:1px 6px;border-radius:3px;margin-top:2px}

/* Power bar */
.pwr-row{display:flex;gap:6px;margin:6px 0}
.pwr-item{flex:1;text-align:center;padding:6px;border-radius:6px;background:#0a0a14;border:1px solid #1e1e40}
.pwr-item .n{font-size:1.1rem;font-weight:900;font-family:'SF Mono',monospace}
.pwr-item .l{font-size:.55rem;color:#555580;margin-top:1px}

/* DS status */
.ds-bar{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.ds-pill{padding:3px 8px;border-radius:4px;font-size:.6rem;font-weight:700;border:1px solid;transition:all .4s}

/* Explanation */
.explain{background:#10102a;border:1px solid #1e1e40;border-radius:10px;padding:10px 14px;margin:6px 0;font-size:.75rem;line-height:1.7;min-height:60px}

/* Chart containers */
.chart-box{background:#10102a;border:1px solid #1e1e40;border-radius:10px;padding:10px}
.chart-box canvas{display:block}

/* Horizontal bar chart (pure CSS) */
.hbar{margin:6px 0}
.hbar-row{display:flex;align-items:center;gap:6px;margin:5px 0}
.hbar-label{width:56px;text-align:right;font-size:.7rem;font-weight:700;flex-shrink:0}
.hbar-track{flex:1;height:20px;background:#1a1a30;border-radius:4px;position:relative;overflow:visible}
.hbar-before{position:absolute;top:2px;left:0;height:7px;border-radius:3px;opacity:.5;transition:width .4s}
.hbar-now{position:absolute;bottom:2px;left:0;height:7px;border-radius:3px;transition:width .4s}
.hbar-val{position:absolute;right:-44px;top:50%;transform:translateY(-50%);font-size:.65rem;font-weight:700;font-family:'SF Mono',monospace;white-space:nowrap}
.hbar-scale{display:flex;justify-content:space-between;font-size:.55rem;color:#444;margin-top:2px;padding:0 56px 0 62px}
.hbar-legend{display:flex;gap:12px;justify-content:center;margin-top:4px;font-size:.6rem}
.hbar-legend span{display:flex;align-items:center;gap:3px}
.hbar-legend i{width:10px;height:6px;border-radius:2px;display:inline-block}
.chart-box .ct{font-size:.72rem;font-weight:700;color:#888;text-align:center;margin-bottom:4px}

/* Process flow */
.flow{display:flex;gap:0;margin:6px 0}
.flow-node{flex:1;text-align:center;padding:6px 4px;border:1px solid #1e1e40;background:#0a0a14;transition:all .4s;position:relative}
.flow-node:first-child{border-radius:8px 0 0 8px}
.flow-node:last-child{border-radius:0 8px 8px 0}
.flow-node .fi{font-size:1.1rem}
.flow-node .fn{font-size:.65rem;font-weight:700}
.flow-node .fd{font-size:.55rem;color:#555580}
.flow-node.active{background:#00c8ff08;border-color:#00c8ff66;z-index:1}
.flow-node.active .fn{color:#00c8ff}
.flow-node.done{background:#51cf6606;border-color:#51cf6644}
.flow-node.done .fn{color:#51cf66}
.flow-arr{position:absolute;right:-6px;top:50%;transform:translateY(-50%);font-size:.7rem;z-index:2}

/* ── Interactive flow (ported from process-viz) ── */
.hflow{background:#08081a;border:1px solid #1e1e40;border-radius:12px;padding:14px;min-height:120px}
.hflow .scene-title{font-size:.9rem;font-weight:800;color:#eef;margin-bottom:10px;text-align:center}
.actor{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:8px 12px;border-radius:10px;background:#10102a;border:2px solid #1e1e40;min-width:80px;z-index:2}
.actor .a-icon{font-size:1.6rem;line-height:1}
.actor .a-name{font-size:.72rem;font-weight:700}
.actor .a-sub{font-size:.58rem;color:#555580}
.actor.glow{box-shadow:0 0 16px var(--gc,#00c8ff33);border-color:var(--gc,#00c8ff)}
.actor.pulse{animation:aPulse 1.5s ease-in-out infinite}
@keyframes aPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes flowMove{0%{left:-10px}100%{left:calc(100% - 10px)}}
.flow-row{display:flex;align-items:center;justify-content:center;gap:0;margin:10px 0;padding:6px 0}
.gate-row{display:flex;gap:6px;justify-content:center;margin:10px 0}
.gate{flex:1;max-width:160px;border-radius:8px;padding:10px;text-align:center;position:relative;overflow:hidden}
.gate::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.gate .g-icon{font-size:1.3rem}
.gate .g-name{font-size:.75rem;font-weight:800;margin:3px 0}
.gate .g-desc{font-size:.62rem;color:#999}
.gate .g-result{font-size:.7rem;font-weight:800;margin-top:4px}
.gate.pass{background:#51cf6608;border:1.5px solid #51cf6644}.gate.pass::before{background:#51cf66}
.gate.fail{background:#ff6b6b08;border:1.5px solid #ff6b6b44}.gate.fail::before{background:#ff6b6b}
.tl{display:flex;align-items:flex-start;margin:10px 0;position:relative}
.tl::before{content:'';position:absolute;top:20px;left:30px;right:30px;height:3px;background:#1e1e40;z-index:0}
.tl-node{flex:1;text-align:center;position:relative;z-index:1}
.tl-node .tl-dot{width:14px;height:14px;border-radius:50%;margin:12px auto 4px;border:2px solid}
.tl-node .tl-time{font-size:.68rem;font-weight:800}
.tl-node .tl-lbl{font-size:.6rem;color:#999;margin-top:2px}
.tl-node .tl-icon{font-size:1.1rem}
</style>
</head>

const BAR_MAX=7; // kW scale max
const BAR_DEVICES=[
  {key:'ev',icon:'🚗',label:'EV',before:6.0,color:'#ffa94d'},
  {key:'bat',icon:'🔋',label:'蓄電池',before:0,color:'#51cf66'},
  {key:'ac',icon:'❄️',label:'AC',before:2.2,color:'#74c0fc'},
  {key:'base',icon:'💡',label:'ベース',before:1.2,color:'#555580'}
];

function renderBars(s){
  const el=document.getElementById('ch1');
  const vals={ev:s.ev,bat:s.bat<0?Math.abs(s.bat):0,ac:s.ac,base:s.base};
  let html='<div class="hbar">';
  for(const d of BAR_DEVICES){
    const bPct=Math.max(0,d.before/BAR_MAX*100);
    const nVal=vals[d.key];
    const nPct=Math.max(0,nVal/BAR_MAX*100);
    const nColor=d.key==='bat'&&s.bat<0?'#51cf66':d.color;
    const nLabel=d.key==='bat'&&s.bat<0?'-'+nVal.toFixed(1):nVal.toFixed(1);
    const changed=Math.abs(nVal-d.before)>0.01;
    html+=`<div class="hbar-row">
      <div class="hbar-label" style="color:${d.color}">${d.icon} ${d.label}</div>
      <div class="hbar-track" style="margin-right:48px">
        <div class="hbar-before" style="width:${bPct}%;background:#ff6b6b"></div>
        <div class="hbar-now" style="width:${nPct}%;background:${changed?'#51cf66':nColor}"></div>
        <div class="hbar-val" style="color:${changed?'#51cf66':'#888'}">${nLabel} kW</div>
      </div>
    </div>`;
  }
  // Net row
  const load=s.ev+s.ac+s.base+(s.bat>0?s.bat:0);
  const gen=s.pv+(s.bat<0?Math.abs(s.bat):0);
  const net=load-gen;
  const netBefore=9.4-1.8;
  html+=`<div class="hbar-row" style="margin-top:6px;padding-top:6px;border-top:1px solid #1e1e40">
    <div class="hbar-label" style="color:#f9e2af">📊 ネット</div>
    <div class="hbar-track" style="margin-right:48px">
      <div class="hbar-before" style="width:${netBefore/BAR_MAX*100}%;background:#ff6b6b"></div>
      <div class="hbar-now" style="width:${Math.max(0,net)/BAR_MAX*100}%;background:${net<3?'#51cf66':'#ff6b6b'}"></div>
      <div class="hbar-val" style="color:${net<3?'#51cf66':'#ff6b6b'}">${net.toFixed(1)} kW</div>
    </div>
  </div>`;
  html+=`<div class="hbar-scale"><span>0</span><span>2</span><span>4</span><span>6 kW</span></div>`;
  html+=`<div class="hbar-legend"><span><i style="background:#ff6b6b;opacity:.5"></i>Before</span><span><i style="background:#51cf66"></i>Now</span></div>`;
  html+='</div>';
  el.innerHTML=html;
}

// Chart 2: Pure Canvas voltage (no Chart.js)

function vProfile(drLevel){
  const pts=[];
  for(let h=0;h<=24;h++){
    let v=1.025-0.012*Math.sin(Math.PI*Math.max(0,h-5)/14);
    if(h>=14&&h<=21){
      const f=Math.exp(-0.5*((h-17.5)/1.8)**2);
      v-=0.07*f;
      if(h>=17) v+=0.045*f*drLevel;
    }
    pts.push(Math.max(0.91,Math.min(1.04,v)));
  }
  return pts;
}

  const cv=document.getElementById('ch2');
  const c=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  c.clearRect(0,0,W,H);

  const pad={t:20,b:24,l:40,r:16};
  const pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  const vMin=0.92,vMax=1.04;

  function xOf(h){return pad.l+h/24*pw}
  function yOf(v){return pad.t+(1-(v-vMin)/(vMax-vMin))*ph}

  // Grid
  c.strokeStyle='#1e1e4066';c.lineWidth=1;
  for(let v=0.92;v<=1.04;v+=0.02){
    const y=yOf(v);
    c.beginPath();c.moveTo(pad.l,y);c.lineTo(W-pad.r,y);c.stroke();
    c.fillStyle='#555';c.font='8px monospace';c.textAlign='right';
    c.fillText(v.toFixed(2),pad.l-4,y+3);
  }
  // X labels
  c.fillStyle='#555';c.font='8px sans-serif';c.textAlign='center';
  for(let h=0;h<=24;h+=4) c.fillText(h+':00',xOf(h),H-6);

  // 0.95 limit
  c.strokeStyle='#ff6b6b55';c.lineWidth=1;c.setLineDash([4,3]);
  c.beginPath();c.moveTo(pad.l,yOf(0.95));c.lineTo(W-pad.r,yOf(0.95));c.stroke();
  c.setLineDash([]);
  c.fillStyle='#ff6b6b88';c.font='bold 8px sans-serif';c.textAlign='left';
  c.fillText('0.95 下限',W-pad.r-50,yOf(0.95)-3);

  // Before line (DR無し)
  const vBefore=vProfile(0);
  c.beginPath();c.strokeStyle='#ff6b6b';c.lineWidth=2;
  for(let h=0;h<=24;h++){h===0?c.moveTo(xOf(h),yOf(vBefore[h])):c.lineTo(xOf(h),yOf(vBefore[h]))}
  c.stroke();

  // After line (DR有り)
  const drLevel=Math.min(1,(S[0].ev-s.ev+Math.abs(s.bat)+(S[0].ac-s.ac))/7.35);
  const vAfter=vProfile(drLevel);
  c.beginPath();c.strokeStyle='#51cf66';c.lineWidth=2.5;
  for(let h=0;h<=24;h++){h===0?c.moveTo(xOf(h),yOf(vAfter[h])):c.lineTo(xOf(h),yOf(vAfter[h]))}
  c.stroke();

  // 17:00 marker
  c.beginPath();c.arc(xOf(17),yOf(s.volt),5,0,Math.PI*2);
  c.fillStyle='#fcc419';c.fill();
  c.fillStyle='#fcc419';c.font='bold 9px monospace';c.textAlign='left';
  c.fillText(s.volt.toFixed(3)+' pu',xOf(17)+8,yOf(s.volt)+3);

  // Legend
  c.font='8px sans-serif';c.textAlign='left';
  const ly=8;
  c.strokeStyle='#ff6b6b';c.lineWidth=2;c.beginPath();c.moveTo(pad.l,ly);c.lineTo(pad.l+20,ly);c.stroke();
  c.fillStyle='#ff6b6b';c.fillText('DR無し',pad.l+24,ly+3);
  c.strokeStyle='#51cf66';c.lineWidth=2.5;c.beginPath();c.moveTo(pad.l+70,ly);c.lineTo(pad.l+90,ly);c.stroke();
  c.fillStyle='#51cf66';c.fillText('DR有り',pad.l+94,ly+3);
}

function render(){
  const s=S[cur];

  // Step bar
  document.getElementById('step-bar').innerHTML=S.map((st,i)=>
    `<div class="stp${i===cur?' on':i<cur?' done':''}" onclick="go(${i})"><span class="sn">${i===0?'Before':i===S.length-1?'After':'Step '+i}</span>${st.id==='before'||st.id==='after'?st.id.toUpperCase():['同意','契約','検証','EV','蓄電池','AC','報告'][i-1]}</div>`
  ).join('');

  // Title
  document.getElementById('step-title').textContent=s.title;

  // ── SVG House update ──
  const isDR=cur>=4&&cur<=8;
  const vc=s.volt>=0.95?'#51cf66':'#ff6b6b';

  // Voltage label
  const svgVolt=document.getElementById('svg-volt');
  svgVolt.textContent=s.volt.toFixed(3)+'pu';
  svgVolt.setAttribute('fill',vc);

  // PV
  document.getElementById('svg-pv').textContent=s.pv.toFixed(1);

  // DS line
  const dsLine=document.getElementById('svg-ds-line');
  const dsActive=cur>=1&&cur<=7;
  dsLine.setAttribute('stroke',dsActive?'#00c8ff':'#1e1e40');
  dsLine.setAttribute('stroke-dasharray',dsActive?'':'4,4');
  const dsLabel=document.getElementById('svg-ds-label');
  const dsLabelTexts={1:'契約確認',2:'ポリシー検証',3:'DR配信',4:'DR配信',5:'DR配信',6:'DR配信',7:'実績報告'};
  dsLabel.textContent=dsLabelTexts[cur]||'';
  dsLabel.setAttribute('opacity',dsActive?'1':'0');

  // DR signal arrow
  document.getElementById('svg-dr-signal').setAttribute('opacity',isDR?'1':'0');

  // Device SVG update helper
  function svgDev(prefix,val,sub,bg){
    document.getElementById('svg-'+prefix+'-val').textContent=val;
    document.getElementById('svg-'+prefix+'-val').setAttribute('fill',bg.c);
    document.getElementById('svg-'+prefix+'-sub').textContent=sub;
    document.getElementById('svg-'+prefix+'-box').setAttribute('stroke',bg.c);
    document.getElementById('svg-'+prefix+'-box').setAttribute('fill',bg.c==='#fcc419'?'#14120a':'#0a0a14');
    document.getElementById('svg-'+prefix+'-badge').setAttribute('fill',bg.c+'18');
    document.getElementById('svg-'+prefix+'-badge-t').textContent=bg.t;
    document.getElementById('svg-'+prefix+'-badge-t').setAttribute('fill',bg.c);
  }
  svgDev('ev',s.ev.toFixed(1)+' kW','SOC '+s.evSOC+'%',s.evBg);
  svgDev('bat',s.bat<0?'放電'+Math.abs(s.bat)+'kW':s.bat>0?s.bat+'kW':'待機','SOC '+s.batSOC+'%',s.batBg);
  svgDev('ac',s.ac.toFixed(1)+' kW',s.acT+'℃',s.acBg);

  // Power summary
  const load=s.ev+s.ac+s.base+(s.bat>0?s.bat:0);
  const gen=s.pv+(s.bat<0?Math.abs(s.bat):0);
  const net=load-gen;
  document.getElementById('pw-load').textContent=load.toFixed(1);document.getElementById('pw-load').style.color=load>5?'#ff6b6b':'#51cf66';
  document.getElementById('pw-gen').textContent=gen.toFixed(1);document.getElementById('pw-gen').style.color='#51cf66';
  document.getElementById('pw-net').textContent=net.toFixed(1);document.getElementById('pw-net').style.color=net>3?'#ff6b6b':'#51cf66';
  document.getElementById('pw-volt').textContent=s.volt.toFixed(3);document.getElementById('pw-volt').style.color=vc;

  // DS pills
  const dsBar=document.getElementById('ds-bar');
  dsBar.innerHTML=Object.entries(s.ds).map(([k,v])=>{
    const ok=v!=='なし';
    const c=v==='なし'?'#ff6b6b':v.includes('DENIED')?'#ff6b6b':'#51cf66';
    return `<div class="ds-pill" style="color:${c};border-color:${c}44;background:${c}08">${k}: ${v}</div>`;
  }).join('');

  // Interactive flow diagram
  renderFlow(cur);

  // Flow
  document.getElementById('flow-bar').innerHTML=FLOW_NODES.map((n,i)=>{
    const cls=i<s.flow?'done':i===s.flow?'active':'';
    return `<div class="flow-node ${cls}">
      <div class="fi">${n.icon}</div><div class="fn" style="color:${cls?n.color:'#333'}">${n.name}</div><div class="fd">${n.desc}</div>
      ${i<FLOW_NODES.length-1?`<div class="flow-arr" style="color:${i<s.flow?'#51cf66':i===s.flow?'#00c8ff':'#333'}">→</div>`:''}
    </div>`;
  }).join('');

  // Charts
  updateCharts(s);
}

function go(i){cur=Math.max(0,Math.min(S.length-1,i));render()}
function next(){go(cur+1)}
function prev(){go(cur-1)}

window.addEventListener('load',()=>{initCharts();render()});
window.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev()});
</script>
